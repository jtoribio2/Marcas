    <main>
        <section>
            <article>
                <h2>
                    QUESTIONARI DE OPINIO SOBRE LA PELICULA
                </h2>
                <form>
                    <fieldset>
                        <legend>
                            <font color="black"><b>DONA LA TEVA OPINIO!</b></font>
                        </legend>
                        <div>
                            <label for="nom">Nom*:</label>
                            <input type="text" id="nom" name="nom" required placeholder="Escriu el teu nom" autofocus
                                pattern="[A-Za-zÀ-ÿ\s]+">
                        </div>
                        <div><label for="cognoms">Cognoms*:</label>
                            <input type="text" id="cognoms" name="cognoms" required
                                placeholder="Escriu els teus cognoms" pattern="[A-Za-zÀ-ÿ\s]+">
                            <div>
                                <label for="data_naixement">Data de naixement:</label>
                                <input type="date" id="data_naixement" name="data_naixement">
                            </div>
                            <div> T'agradat la peli?
                                <input type="radio" id="increible" name="opinio" value="increible">
                                <label for="increible">Increible</label>
                                <input type="radio" id="molt" name="opinio" value="molt">
                                <label for="molt">Me agrada molt</label>
                                <input type="radio" id="estabe" name="opinio" value="estabe">
                                <label for="estabe">Esta bé</label>
                                <input type="radio" id="indiferent" name="opinio" value="indiferent">
                                <label for="indiferent">Indiferent</label>
                                <input type="radio" id="dolenta" name="opinio" value="dolenta">
                                <label for="dolenta">Dolenta</label>
                            </div>
                            <div>On l'has vist?</div>
                            <input type="checkbox" id="cinema" name="visualitzacio[]" value="cinema">
                            <label for="cinema">Cinema</label>
                            <input type="checkbox" id="streaming" name="visualitzacio[]" value="streaming">
                            <label for="streaming">Striming</label>
                            <div>
                                <label for="comentari">Comentari sobre la pel·lícula:</label><br>
                                <textarea id="comentari" name="comentari" rows="6" cols="60"
                                    placeholder="Escriu aquí la teva opinió, què t'ha agradat, què no...">
    </textarea>
                            </div>
                            <input type="image" src="./imatges/pilota.png" alt="Envia el formulari" width="80"
                                height="80">
                            <div><button type="reset">Esborrar</button></div>
                    </fieldset>
                </form>
            </article>
        </section>
