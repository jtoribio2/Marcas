<html>

<head>
	<style>
		html,
		body {
			background-color: #2b2b2b;
			/* gris oscuro */
			margin: 0;
			/* opcional, elimina el espacio blanco por defecto */
			padding: 0;
		}

		.titulo {
			color: white;
			font-weight: bold;
			font-size: 20px;
			/* Puedes ajustar el tamaño, por ejemplo 28px, 36px, etc */
			padding: 10px 15px;
		}

		.barra {
			color: white;
			background-color: #2b2b2b;
			font-weight: bold;
			/* Puedes ajustar el tamaño, por ejemplo 28px, 36px, etc */
			padding: 10px 15px;
		}

		img {
			width: 200px;
			height: auto;
			border: 2px dotted #2b2b2b;
		}

		nav {
			background-color: #d9d9d9;
			/* gris claro */
			padding: 10px;
			text-align: left;
			/* asegura alineación a la izquierda */
		}

		nav table td {
			color: #2b2b2b;
			/* gris oscuro */
			font-weight: bold;
			padding: 8px 16px;
			/* espacio interno en cada celda */
		}

		nav table {
			border-collapse: separate;
			/* permite separación entre celdas */
			border-spacing: 10px;
			/* espacio entre cada <td> */
		}

		.outside {
			display: flex;
			gap: 20px;
			align-items: stretch;
			padding: 20px;
		}

		.wrapper,
		.aside,
		.nav {
			background-color: #ced3e1;
			color: #2b2b2b;
			font-weight: bold;
			padding: 20px;
			border-radius: 12px;

			flex: 1;
			/* ambos ocupan el mismo espacio */
			min-width: 70px;
			/* evita que se colapsen cuando la pantalla se haga pequeña */
			min-height: auto;
			/* altura mínima según contenido */
		}

		.nav{
			max-height: 350px;
		}

		.wrapper {
			flex: 2;
		}

		.imagenes {
			background-color: #d9d9d9;
			display: flex;
			flex-wrap: nowrap;
			/* NO SALTA DE LÍNEA */
			gap: 10px;
			/* espacio entre imágenes */
			margin-top: 10px;
			overflow-x: auto;
			/* (opcional) scroll si no caben */
		}

		.imagenes_wrapper {
			background-color: #d9d9d9;
			display: flex;
			flex-wrap: wrap;
			/* PERMITE SALTO DE LÍNEA */
			gap: 10px;
			/* misma separación */
			margin-top: 10px;
			overflow: hidden;
			/* evita scroll */
		}
	</style>
</head>

<body>
	<header>
		<div class="titulo">
			<h1>FlexBox</h1>
		</div>
		<nav>
			<table>
				<tbody>
					<tr>
						<td>Flex</td>
						<td>Flex2</td>
						<td>Flex3</td>
						<td>Felx4</td>
					</tr>
				</tbody>
			</table>
		</nav>
	</header>
	<main>
		<div class="outside">
			<div class="nav">nav</div>
			<div class="wrapper">
				<p>hola</p>
				<div class="barra">
					<p>flex-wrap: no wrap</p>
				</div>
				<div class="imagenes">
					<img src="./images/img1.svg">
					<img src="./images/img2.svg">
					<img src="./images/img3.svg">
					<img src="./images/img4.svg">
					<img src="./images/img5.svg">
					<img src="./images/img6.svg">
				</div>
				<div class="barra">
					<p>flex-wrap: wrap</p>
				</div>
				<div class="imagenes_wrapper">
					<img src="./images/img1.svg">
					<img src="./images/img2.svg">
					<img src="./images/img3.svg">
					<img src="./images/img4.svg">
					<img src="./images/img5.svg">
					<img src="./images/img6.svg">
				</div>
			</div>
			<div class="aside">aside</div>
		</div>
	</main>
	<footer>
		<div class="titulo">
			<h1>Footer</h1>
		</div>
	</footer>
</body>

</html>
