<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../css/bootstrap.min.css">
	<title>Classes per a validacions</title>
</head>
<body>
	<div class="container">
		<div class="row mt-5">
			<div class="col-6">
				<form action="">
					<label for="nombre" class="form-label">Nom</label>
					<input type="text" class="form-control is-valid" placeholder="Nom" name="nom" id="nom">
					<div class="valid-feedback">Correcte!</div>
				</form>
			</div>

			<div class="col-6">
				<form action="">
					<label for="correu" class="form-label">Correu</label>
					<input type="email" class="form-control is-invalid" placeholder="correu@correu.com" name="correu" id="correu">
					<div class="invalid-feedback">Sisplau introdueix un correu vàlid.</div>
				</form>
			</div>
		</div>
	</div>

	<script src="../js/bootstrap.bundle.js"></script>
</body>
</html>
