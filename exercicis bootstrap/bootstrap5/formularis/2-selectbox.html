<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Select Box</title>
	<link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>
	<div class="container">
		<div class="row mt-3">

			<select name="pais" id="pais" class="form-select mb-3" aria-label="Selecció de pais">
				<option value="nauru">República de Nauru</option>
				<option value="Illes Marshall">Illes Marshall</option>
				<option value="Tuvalu">Tuvalu</option>
			</select>

			<select name="pais" id="pais" class="form-select form-select-lg mb-3" aria-label="Selecció de pais">
				<option value="nauru">República de Nauru</option>
				<option value="Illes Marshall">Illes Marshall</option>
				<option value="Tuvalu">Tuvalu</option>
			</select>

			<select name="pais" id="pais" class="form-select form-select-sm mb-3" aria-label="Selecció de pais">
				<option value="nauru">República de Nauru</option>
				<option value="illes marshall">Illes Marshall</option>
				<option value="tuvalu">Tuvalu</option>
			</select>
			<select multiple size="3" name="pais" id="pais" class="form-select mb-3" aria-label="Selecció de pais">
				<option value="nauru">República de Nauru</option>
				<option value="illes marshall">Illes Marshall</option>
				<option value="Tuvalu">Tuvalu</option>
				<option value="maldives">Maldives</option>
			</select>
			<select disabled name="pais" id="pais" class="form-select mb-3" aria-label="Selecció de pais">
				<option value="nauru">República de Nauru</option>
				<option value="illes marshall">Illes Marshall</option>
				<option value="tuvalu">Tuvalu</option>
			</select>
		</div>
	</div>

	<script src="../js/bootstrap.bundle.min.js"></script>
</body>
</html>
