<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../css/bootstrap-grid.min.css">
	<title>Espaiats entre columnes (Gutters)</title>
	<style>
		.row {
			background: #e8e8e8;
			margin-top: 20px;
		}

		.content {
			background: #f2f2f2;
			text-align: center;
			padding: 10px;
			border: 1px solid #4d5061;
			text-align: center;
			margin: 10px 0;
			border: 1px;
		}

		.columna_interior {
			background: #f31111;
		}
	</style>
</head>
<body>
	<div class="content">
		<div class="row">
			<div class="col-12">
				<p>hader</p>
			</div>
			<div class="col-6">
				aaa
			</div>
			<div class="col-6">
				bbb
			</div>
			<div class="col-12">
				<p>footer</p>
			</div>
		</div>
	</div>
	<div class="content">
		<div class="row">
			<div class="columna col-12 col-md-6">
				columna 1
				<div class="row">
					<div class="columna_interior col-12 col-md-6">col.1.1</div>
					<div class="columna_interior col-12 col-md-6">col.1.2</div>
				</div>
			</div>
			<div class=" columna col-12 col-md-6">
				columna 2
				<div class="row">
					<div class="columna_interior col-12 col-md-6">col.2.1</div>
					<div class="columna_interior col-12 col-md-6">col.2.2</div>
				</div>
			</div>
		</div>
	</div>

		<div class="content">
		<div class="row">
			<div class="col-12">
				<p>hader</p>
			</div>
			<div class="col-6">
				aaa
			</div>
			<div class="col-6">
				bbb
			</div>
			<div class="col-12">
				<p>footer</p>
			</div>
		</div>
	</div>
	<div class="content">
		<div class="row row-cols-4">
			<div class="col">columna 1</div>
			<div class="col">columna 2</div>
			<div class="col">columna 3</div>
			
		</div>
		<div class="row row-cols-4">
			<div class="col">columna 1</div>
			<div class="col">columna 2</div>
			<div class="col">columna 3</div>
			
		</div>
		<div class="row row-cols-4">
			<div class="col">columna 1</div>
			<div class="col">columna 2</div>
			<div class="col">columna 3</div>
			
		</div>
	</div>

	<script src="../js/bootstrap.bundle.js"></script>
</body>
</html>
