<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bootstrap 5</title>
	<link rel="stylesheet" href="./css/bootstrap.min.css">
</head>
<body>
	<div class="container">
		<div class="row mt-3">
			<div class="col-12">
				<button type="button" class="btn btn-primary">Primari</button>
				<button type="button" class="btn btn-secondary">Secundari</button>
				<button type="button" class="btn btn-success">Èxit</button>
				<button type="button" class="btn btn-danger">Perill</button>
				<button type="button" class="btn btn-warning">Advertència</button>
				<button type="button" class="btn btn-info">Informació</button>
				<button type="button" class="btn btn-light">Clar</button>
				<button type="button" class="btn btn-dark">Fosc</button>
				<button type="button" class="btn btn-link">Enllaç</button>
			</div>

			<div class="col-12">
				<hr class="mt-3">
				<button type="button" class="btn btn-outline-primary">Primari</button>
				<button type="button" class="btn btn-outline-secondary">Secundari</button>
				<button type="button" class="btn btn-outline-success">Èxit</button>
				<button type="button" class="btn btn-outline-danger">Perill</button>
				<button type="button" class="btn btn-outline-warning">Advertència</button>
				<button type="button" class="btn btn-outline-info">Informació</button>
				<button type="button" class="btn btn-outline-light text-dark">Clar</button>
				<button type="button" class="btn btn-outline-dark">Fosc</button>
			</div>

			<div class="col-12">
				<hr class="mt-3">
				<button type="button" class="btn disabled btn-primary">Primari</button>
				<button type="button" class="btn disabled btn-secondary">Secundari</button>
				<button type="button" class="btn disabled btn-success">Èxit</button>
				<button type="button" class="btn disabled btn-danger">Perill</button>
				<button type="button" class="btn disabled btn-warning">Advertència</button>
				<button type="button" class="btn disabled btn-info">Informació</button>
				<button type="button" class="btn disabled btn-light">Clar</button>
				<button type="button" class="btn disabled btn-dark">Fosc</button>
			</div>

			<div class="col-12">
				<hr class="mt-3">
				<a href="#" class="btn btn-primary">Enllaç</a>
				<button class="btn btn-primary" type="button">Botó</button>
				<input type="button" class="btn btn-primary" value="Botó Input">
				<input type="submit" class="btn btn-primary" value="Submit">
			</div>

			<div class="col-12">
				<hr class="mt-3">
				<button class="btn btn-lg btn-primary" type="button">Botó Gran</button>
				<button class="btn btn-lg btn-primary" type="button">Botó Secundari Gran</button>
				<button class="btn btn-sm btn-primary" type="button">Botó Petit</button>
				<button class="btn btn-sm btn-primary" type="button">Botó Secundari Petit</button>
			</div>

			<div class="col-12">
				<hr class="mt-3">
				<div class="d-grid gap-4 col-12">
					<button class="btn btn-primary" type="button">Primari1</button>
					<button class="btn btn-secondary" type="button">Secundari1</button>
				</div>
			</div>

			<div class="col-12">
				<hr class="mt-3">				
				<div class="d-flex gap-2 justify-content-center">
					<button class="btn btn-primary" type="button">Primari2</button>
					<button class="btn btn-secondary" type="button">Secundari2</button>
				</div>
			</div>
		</div>
	</div>

	<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
