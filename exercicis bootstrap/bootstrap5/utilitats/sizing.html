<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../css/bootstrap.min.css">
	<title>Mides (sizing)</title>
</head>
<body>
	<div class="container">
		<div class="row mt-5">
			<!-- Espaiat
				p - Padding
				m - Margin

				t - Top
				b - Bottom
				s - Start (esquerra)
				e - End (dreta)

				y - Eix Y (Dalt i abaix)
				x - Eix X (Esquerra i dreta)
			-->

			<!-- Amples
				.w-25 - Ample del 25%
				.w-50 - Ample del 50%
				.w-75 - Ample del 75%
				.w-100 - Ample del 100%
			-->

			<!-- Alçades
				.h-25 - Alçada del 25%
				.h-50 - Alçada del 50%
				.h-75 - Alçada del 75%
				.h-100 - Alçada del 100%
			-->
			<div class="col-6">
				<div class="bg-primary text-white p-2 my-2 w-25">25%</div>
				<div class="bg-primary text-white p-2 my-2 w-50">50%</div>
				<div class="bg-primary text-white p-2 my-2 w-75">75%</div>
				<div class="bg-primary text-white p-2 my-2 w-100">100%</div>
			</div>

			<div class="col-6">
				<div style="height: 200px" class="bg-dark">
					<div class="bg-primary text-white p-2 mx-2 d-inline-block h-25">25%</div>
					<div class="bg-primary text-white p-2 mx-2 d-inline-block h-50">50%</div>
					<div class="bg-primary text-white p-2 mx-2 d-inline-block h-75">75%</div>
					<div class="bg-primary text-white p-2 mx-2 d-inline-block h-100">100%</span></div>
				</div>
			</div>
		</div>
	</div>

	<script src="../js/bootstrap.bundle.js"></script>
</body>
</html>
